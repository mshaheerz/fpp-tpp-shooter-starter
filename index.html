<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPP + TPP FPS Starter</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
      #app, canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        width: 100%; height: 100%;
      }
      #lock-hint {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #fff; font: 14px/1.4 system-ui, sans-serif; text-align: center;
        background: rgba(0,0,0,0.55); padding: 12px 20px; border-radius: 8px;
        pointer-events: none;
      }
      #lock-hint.hidden { display: none; }

      #map-menu {
        position: fixed; inset: 0; z-index: 90000;
        background: radial-gradient(circle at 50% 35%, rgba(28,32,38,0.92), rgba(8,10,14,0.96));
        display: flex; align-items: center; justify-content: center;
        font: 14px/1.4 system-ui, -apple-system, sans-serif; color: #e6e8ec;
      }
      #map-menu.hidden { display: none; }
      #map-menu .map-menu-inner {
        width: min(960px, 92vw); max-height: 90vh; overflow-y: auto;
        padding: 28px 28px 22px;
      }
      #map-menu h1 {
        margin: 0 0 22px; font-size: 22px; letter-spacing: 0.06em;
        text-transform: uppercase; font-weight: 600; color: #fff;
      }
      #map-menu-grid {
        display: grid; gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .map-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px; padding: 18px 18px 16px;
        cursor: pointer; transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }
      .map-card:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.22);
        transform: translateY(-1px);
      }
      .map-card .map-name {
        font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;
      }
      .map-card .map-desc {
        font-size: 12.5px; color: #b8bdc6; line-height: 1.5;
      }
      #tdm-section {
        margin-top: 26px; padding: 20px; border-radius: 10px;
        background: rgba(150,40,40,0.10);
        border: 1px solid rgba(220,90,90,0.28);
      }
      #tdm-section .tdm-title {
        margin: 0 0 4px; font-size: 17px; font-weight: 600; color: #ffd9d0;
        letter-spacing: 0.04em; text-transform: uppercase;
      }
      #tdm-section .tdm-sub { font-size: 12.5px; color: #c8b3b0; margin-bottom: 16px; }
      #tdm-section .tdm-row {
        display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap;
      }
      #tdm-section .tdm-field { display: flex; flex-direction: column; gap: 5px; }
      #tdm-section .tdm-field label {
        font-size: 11px; color: #b8bdc6; text-transform: uppercase; letter-spacing: 0.05em;
      }
      #tdm-section select, #tdm-section input {
        background: #161a20; color: #eef2f6; border: 1px solid #3a4150;
        border-radius: 6px; padding: 7px 9px; font: 13px/1 ui-monospace, monospace;
      }
      #tdm-section .tdm-num { width: 70px; }
      #tdm-section .tdm-start {
        margin-left: auto; background: #c0413f; color: #fff; border: none;
        border-radius: 7px; padding: 10px 20px; font-size: 14px; font-weight: 600;
        cursor: pointer; transition: background 120ms ease, transform 120ms ease;
      }
      #tdm-section .tdm-start:hover { background: #d44d4a; transform: translateY(-1px); }

      .map-menu-footer {
        margin-top: 20px; color: #8a8f96; font-size: 12px; text-align: right;
      }
      .map-menu-footer kbd {
        background: rgba(255,255,255,0.1); border-radius: 4px;
        padding: 1px 6px; font: 11px/1 ui-monospace, monospace; color: #d6d9de;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <canvas id="hud"></canvas>
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100000;">
      <div style="background:rgba(0,0,0,0.8);color:#fff;padding:18px 24px;border-radius:10px;font:14px/1.4 system-ui, sans-serif;max-width:90%;text-align:center">
        <div id="loading-text">Loading…</div>
      </div>
    </div>
    <div id="map-menu" class="hidden">
      <div class="map-menu-inner">
        <h1>Select Map</h1>
        <div id="map-menu-grid"></div>
        <div id="tdm-section"></div>
        <div class="map-menu-footer">Press <kbd>M</kbd> in game to reopen this menu</div>
      </div>
    </div>
    <div id="lock-hint">Click to play — WASD / Space / Shift, Ctrl crouch, R reload, 1/2/3 swap, V toggle FPP/TPP, M change map, F7 debugger</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
