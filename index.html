<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPP + TPP FPS Starter</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
      #app, canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        width: 100%; height: 100%;
      }
      #lock-hint {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #fff; font: 14px/1.4 system-ui, sans-serif; text-align: center;
        background: rgba(0,0,0,0.55); padding: 12px 20px; border-radius: 8px;
        pointer-events: none;
      }
      #lock-hint.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <canvas id="hud"></canvas>
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100000;">
      <div style="background:rgba(0,0,0,0.8);color:#fff;padding:18px 24px;border-radius:10px;font:14px/1.4 system-ui, sans-serif;max-width:90%;text-align:center">
        <div id="loading-text">Loading…</div>
      </div>
    </div>
    <div id="lock-hint">Click to play — WASD / Space / Shift, R reload, 1/2/3 swap, V toggle FPP/TPP</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
